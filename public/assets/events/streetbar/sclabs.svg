<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" width="240" height="220">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f4f6"/>
      <stop offset="35%" stop-color="#c8ccd2"/>
      <stop offset="55%" stop-color="#9aa0a8"/>
      <stop offset="80%" stop-color="#d8dce2"/>
      <stop offset="100%" stop-color="#86898f"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8ea"/>
      <stop offset="100%" stop-color="#b4b6ba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="240" height="220" fill="url(#bg)"/>
  <!-- Outer octagon -->
  <polygon points="50,20 190,20 220,55 220,165 190,200 50,200 20,165 20,55"
           fill="none" stroke="url(#metal)" stroke-width="3" filter="url(#shadow)"/>
  <!-- Inner octagon -->
  <polygon points="55,28 185,28 212,58 212,162 185,192 55,192 28,162 28,58"
           fill="none" stroke="url(#metal)" stroke-width="1.5" opacity="0.7"/>
  <!-- Roof/A symbol on top -->
  <g filter="url(#shadow)">
    <path d="M 95 70 L 120 45 L 145 70 L 138 70 L 138 75 L 102 75 L 102 70 Z"
          fill="url(#metal)" stroke="#666" stroke-width="0.8"/>
    <rect x="115" y="55" width="2" height="20" fill="#666"/>
    <rect x="123" y="55" width="2" height="20" fill="#666"/>
  </g>
  <!-- SC text -->
  <text x="120" y="140" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900" font-size="62"
        fill="url(#metal)" stroke="#5a5d62" stroke-width="1.2"
        filter="url(#shadow)">SC</text>
  <!-- LABS text -->
  <text x="120" y="170" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="700" font-size="18"
        fill="url(#metal)" stroke="#5a5d62" stroke-width="0.6"
        letter-spacing="3">LABS</text>
</svg>
