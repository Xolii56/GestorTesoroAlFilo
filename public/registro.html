<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Departamento del Tesoro — Registro</title>

  <link rel="stylesheet" href="./style.css"/>
  <link rel="stylesheet" href="./style_prueba.css"/>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="./config.js" defer></script>
  <script src="./modules/db.js" defer></script>
  <script src="./modules/layout.js" defer></script>

  <style>
    main.reg-main{
      padding:1.5rem;
      max-width:1100px;
      margin:0 auto;
    }

    .reg-header-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      margin-bottom:1rem;
      gap:.75rem;
      flex-wrap:wrap;
    }

    .reg-toolbar-wrap{ margin-top:.25rem; margin-bottom:.6rem; }
    .help-text{ font-size:.75rem; opacity:.75; margin-top:.15rem; }

    .reg-table-wrap{
      max-height:560px;
      overflow:auto;
      margin-top:.2rem;
    }

    /* ======= Alineación SIN tocar estética/tamaños ======= */
    .ui-toolbar .ui-group{
      display:flex;
      gap:.45rem;           /* pequeño, como antes */
      flex-wrap:wrap;       /* si no cabe, baja (fallback) */
      align-items:flex-end; /* alinear bottoms */
    }

    .ui-filter{
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      gap:.25rem;
    }

    /* Fila para alinear alturas:
       - En filtros normales: invisible pero ocupa (no muestra guiones)
       - En fechas: visible ("Desde"/"Hasta") */
    .ui-filter-label{
      height: 14px;
      line-height: 14px;
      font-size:.72rem;
      opacity:.75;
      user-select:none;
    }
    .ui-filter-label.ghost{
      opacity:0;            /* invisible */
      pointer-events:none;
    }

    /* Host datepicker: que se comporte como un input normal */
    .date-host .date-picker{ width:100%; }

    /* Ojo: NO ocultamos labels del componente a lo bruto,
       solo evitamos que meta uno extra si existiera */
    .date-host .date-label{ display:none !important; }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main class="reg-main">
    <div class="reg-header-row">
      <div>
        <h2>Registro</h2>
        <p style="opacity:.8;margin-top:.2rem;font-size:.9rem;">
          Histórico unificado de operaciones. Filtra por estado, tipo, activo y rango de fechas.
        </p>
      </div>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='./app_ui.html'">
        ← Volver al panel
      </button>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Operaciones</h3>
      </div>

      <div class="reg-toolbar-wrap">
        <div class="ui-toolbar">
          <div class="ui-group">

            <!-- Buscar -->
            <div class="ui-filter">
              <div class="ui-filter-label ghost">&nbsp;</div>
              <input type="search" id="reg-search" placeholder="Buscar por solicitante o material..." />
            </div>

            <!-- Estado -->
            <div class="ui-filter">
              <div class="ui-filter-label ghost">&nbsp;</div>
              <select id="reg-status-filter">
                <option value="todas">Todos los estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="aprobada">Aprobada</option>
                <option value="rechazada">Rechazada</option>
                <option value="cancelada">Cancelada</option>
                <option value="completada">Completada</option>
              </select>
            </div>

            <!-- Tipo -->
            <div class="ui-filter">
              <div class="ui-filter-label ghost">&nbsp;</div>
              <select id="reg-type-filter">
                <option value="todas">Todos los tipos</option>
                <option value="compra">Compra</option>
                <option value="venta">Venta</option>
              </select>
            </div>

            <!-- Activo -->
            <div class="ui-filter">
              <div class="ui-filter-label ghost">&nbsp;</div>
              <select id="reg-active-filter">
                <option value="todas">Todos los activos</option>
                <option value="commodities">Commodities</option>
                <option value="prestamo">Préstamo</option>
                <option value="taller">Taller</option>
                <option value="armeria">Armería</option>
              </select>
            </div>

            <!-- Desde -->
            <div class="ui-filter">
              <div class="ui-filter-label">Desde</div>
              <div id="reg-date-from-host" class="date-host"></div>
              <input type="hidden" id="reg-date-from-iso" value=""/>
            </div>

            <!-- Hasta -->
            <div class="ui-filter">
              <div class="ui-filter-label">Hasta</div>
              <div id="reg-date-to-host" class="date-host"></div>
              <input type="hidden" id="reg-date-to-iso" value=""/>
            </div>

            <!-- Limpiar -->
            <div class="ui-filter">
              <div class="ui-filter-label ghost">&nbsp;</div>
              <button type="button" class="btn btn-secondary" id="reg-clear-filters">
                Limpiar filtros
              </button>
            </div>

          </div>
        </div>

        <p class="help-text">
          Consejo: usa “Desde/Hasta” para acotar por fecha de creación.
        </p>
      </div>

      <div class="reg-table-wrap">
        <div class="table-container" id="cmp-tab-07"></div>
      </div>
    </div>
  </main>

  <!-- Casteo de TAB-07 + DAT-01 -->
  <script type="module">
    import { loadComponentById } from './modules/ui_components.js';

    function ensureTbodyId(containerId, wantedId){
      const host = document.getElementById(containerId);
      if (!host) return;

      const direct = host.querySelector(`#${CSS.escape(wantedId)}`);
      if (direct) return;

      const slot = host.querySelector('[data-slot="tbody"]');
      if (slot) { slot.id = wantedId; return; }

      const tb = host.querySelector('tbody');
      if (tb) tb.id = wantedId;
    }

    await loadComponentById('./components/tab-07.html', 'cmp-tab-07');
    ensureTbodyId('cmp-tab-07', 'reg-tbody');

    await loadComponentById('./components/dat-01.html', 'reg-date-from-host');
    await loadComponentById('./components/dat-01.html', 'reg-date-to-host');
  </script>

  <!-- LÓGICA -->
  <script type="module">
    import { getOrgStatus } from './modules/profile.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const { supa } = window;

      function statusTagClass(st){ return `tag tag--${st}`; }
      function tipoTagClass(tipo){ return (tipo === 'venta') ? 'tag tag--venta' : 'tag tag--compra'; }

      function formatStatus(st){
        const map = {
          pendiente:'Pendiente',
          aprobada:'Aprobada',
          rechazada:'Rechazada',
          completada:'Completada',
          cancelada:'Cancelada'
        };
        return map[st] || st || '-';
      }
      function renderTipo(tipo){
        if (!tipo) return '-';
        return tipo === 'compra' ? 'Compra' : 'Venta';
      }
      function renderActivo(key){
        const map = { commodities:'Commodities', prestamo:'Préstamo', taller:'Taller', armeria:'Armería' };
        return map[key] || key || '-';
      }

      /* DAT-01 init */
      function initDat01(pickerRoot, opts = {}) {
        if (!pickerRoot) return null;

        const input = pickerRoot.querySelector('.date-input');
        const popover = pickerRoot.querySelector('.date-popover');
        const monthLabel = pickerRoot.querySelector('.date-month');
        const grid = pickerRoot.querySelector('.date-grid');
        const navs = pickerRoot.querySelectorAll('.date-nav');
        const btnClear = pickerRoot.querySelector('.date-clear');
        const btnToday = pickerRoot.querySelector('.date-today');
        const btnPlus = pickerRoot.querySelectorAll('.date-plus');

        const locale = pickerRoot.dataset.locale || 'es-ES';
        const monthNames = new Intl.DateTimeFormat(locale, { month: 'long' });

        const pad2 = (n) => String(n).padStart(2, '0');
        const toISO = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
        const formatDisplay = (iso) => {
          if (!iso) return '';
          const [y,m,d] = iso.split('-').map(Number);
          const dt = new Date(y, m-1, d);
          return new Intl.DateTimeFormat(locale, { year:'numeric', month:'2-digit', day:'2-digit' }).format(dt);
        };

        const minToday = !!opts.minToday;

        function buildCalendar(target, year, month, selectedISO) {
          target.innerHTML = '';
          const first = new Date(year, month, 1);
          const last  = new Date(year, month + 1, 0);
          const firstWeekday = (first.getDay() + 6) % 7;
          const daysInMonth = last.getDate();

          const prevLast = new Date(year, month, 0).getDate();
          for (let i = 0; i < firstWeekday; i++) {
            const day = prevLast - (firstWeekday - 1 - i);
            const el = document.createElement('button');
            el.type = 'button';
            el.className = 'date-day muted';
            el.textContent = day;
            target.appendChild(el);
          }

          const todayISO = toISO(new Date());

          for (let d = 1; d <= daysInMonth; d++) {
            const iso = `${year}-${pad2(month+1)}-${pad2(d)}`;
            const el = document.createElement('button');
            el.type = 'button';
            el.className = 'date-day';
            el.dataset.iso = iso;
            el.textContent = d;

            if (iso === selectedISO) el.classList.add('selected');
            if (iso === todayISO) el.classList.add('today');

            if (minToday && iso < todayISO) {
              el.classList.add('muted');
              el.disabled = true;
            }
            target.appendChild(el);
          }

          const total = firstWeekday + daysInMonth;
          const remain = (7 - (total % 7)) % 7;
          for (let i = 1; i <= remain; i++) {
            const el = document.createElement('button');
            el.type = 'button';
            el.className = 'date-day muted';
            el.textContent = i;
            target.appendChild(el);
          }
        }

        function decidePopoverDirection() {
          const rect = pickerRoot.getBoundingClientRect();
          const viewportH = window.innerHeight || document.documentElement.clientHeight;

          const wasHidden = !pickerRoot.classList.contains('open');
          if (wasHidden) {
            pickerRoot.classList.add('open');
            popover.setAttribute('aria-hidden', 'false');
          }

          const popH = popover.getBoundingClientRect().height;

          if (wasHidden) {
            pickerRoot.classList.remove('open');
            popover.setAttribute('aria-hidden', 'true');
          }

          const spaceBelow = viewportH - rect.bottom;
          const spaceAbove = rect.top;

          const needsUp = spaceBelow < (popH + 12) && spaceAbove > spaceBelow;
          pickerRoot.classList.toggle('open-up', needsUp);
        }

        let view = new Date();
        view.setDate(1);

        let selectedISO = '';

        function render() {
          const y = view.getFullYear();
          const m = view.getMonth();
          const monthText = monthNames.format(new Date(y, m, 1));
          monthLabel.textContent = `${monthText.charAt(0).toUpperCase()}${monthText.slice(1)} ${y}`;
          buildCalendar(grid, y, m, selectedISO);
        }

        function open() { decidePopoverDirection(); pickerRoot.classList.add('open'); popover.setAttribute('aria-hidden','false'); }
        function close(){ pickerRoot.classList.remove('open'); popover.setAttribute('aria-hidden','true'); }
        function toggle(){ pickerRoot.classList.contains('open') ? close() : open(); }

        function setISO(iso) {
          selectedISO = iso || '';
          input.value = formatDisplay(selectedISO);
          if (selectedISO) {
            const [y,m] = selectedISO.split('-');
            view = new Date(Number(y), Number(m)-1, 1);
          }
          render();
          close();
          if (typeof opts.onChange === 'function') opts.onChange(selectedISO);
        }

        input.addEventListener('click', toggle);

        navs.forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = Number(btn.dataset.dir || 0);
            view.setMonth(view.getMonth() + dir);
            view.setDate(1);
            render();
            if (pickerRoot.classList.contains('open')) decidePopoverDirection();
          });
        });

        grid.addEventListener('click', (e) => {
          const t = e.target;
          if (!t.classList.contains('date-day')) return;
          if (t.classList.contains('muted')) return;
          const iso = t.dataset.iso;
          if (!iso) return;
          setISO(iso);
        });

        btnClear?.addEventListener('click', () => setISO(''));
        btnToday?.addEventListener('click', () => setISO(toISO(new Date())));
        btnPlus?.forEach(b => {
          b.addEventListener('click', () => {
            const days = Number(b.dataset.days || 0);
            const now = new Date();
            now.setDate(now.getDate() + days);
            setISO(toISO(now));
          });
        });

        window.addEventListener('resize', () => { if (pickerRoot.classList.contains('open')) decidePopoverDirection(); });
        window.addEventListener('scroll', () => { if (pickerRoot.classList.contains('open')) decidePopoverDirection(); }, { passive:true });
        document.addEventListener('click', (e) => { if (!pickerRoot.contains(e.target)) close(); });

        render();
        return { setISO, getISO: () => selectedISO };
      }

      /* Sesión */
      const { data: { session } } = await supa.auth.getSession();
      if (!session) { window.location.href = './index.html'; return; }

      const orgStatus = await getOrgStatus();
      if (!orgStatus || !['miembro','daga','espada','admin'].includes(orgStatus)) {
        await supa.auth.signOut();
        window.location.href = './index.html';
        return;
      }

      if (typeof window.loadHeader === 'function') await window.loadHeader('app');
      if (typeof window.initHeaderUserMenu === 'function') {
        window.initHeaderUserMenu(
          session,
          async () => { await supa.auth.signOut(); window.location.href = "./index.html"; },
          () => window.location.href = './perfil.html'
        );
      }

      /* Permisos */
      const { data: meRow } = await supa
        .from('users')
        .select('tesoro_internal_role')
        .eq('id', session.user.id)
        .maybeSingle();

      let myRole = meRow?.tesoro_internal_role || null;
      if (typeof myRole === 'string') myRole = myRole.trim();

      let roleRow = null;
      if (myRole) {
        const asNumber = Number(myRole);
        if (!Number.isNaN(asNumber) && myRole !== '') {
          const { data, error } = await supa.from('roles_app').select('*').eq('id', asNumber).maybeSingle();
          if (!error) roleRow = data;
        }
        if (!roleRow) {
          const { data, error } = await supa.from('roles_app').select('*').ilike('role_name', myRole).maybeSingle();
          if (!error) roleRow = data;
        }
      }

      let regLevel = roleRow?.registro ?? 0;
      if (!regLevel || regLevel === 0) {
        alert('No tienes acceso al módulo de Registro.');
        window.location.href = './app_ui.html';
        return;
      }

      /* DOM */
      const tbody = document.getElementById('reg-tbody');

      const searchInput   = document.getElementById('reg-search');
      const statusFilter  = document.getElementById('reg-status-filter');
      const typeFilter    = document.getElementById('reg-type-filter');
      const activeFilter  = document.getElementById('reg-active-filter');
      const clearBtn      = document.getElementById('reg-clear-filters');

      const fromIsoHidden = document.getElementById('reg-date-from-iso');
      const toIsoHidden   = document.getElementById('reg-date-to-iso');

      const fromRoot = document.querySelector('#reg-date-from-host .date-picker');
      const toRoot   = document.querySelector('#reg-date-to-host .date-picker');

      let fromISO = '';
      let toISO = '';

      const fromApi = initDat01(fromRoot, {
        minToday:false,
        onChange:(iso)=>{
          fromISO = iso || '';
          fromIsoHidden.value = fromISO;
          renderTable();
        }
      });

      const toApi = initDat01(toRoot, {
        minToday:false,
        onChange:(iso)=>{
          toISO = iso || '';
          toIsoHidden.value = toISO;
          renderTable();
        }
      });

      /* Cache usuarios */
      const usersById = {};
      const { data: users } = await supa.from('users').select('id, handle_name, discord_username');
      (users || []).forEach(u => { usersById[u.id] = u; });

      /* Datos */
      let rows = [];

      async function loadRows(){
        tbody.innerHTML = '<tr><td colspan="8">Cargando...</td></tr>';

        const { data: reqs, error } = await supa
          .from('requests')
          .select(`
            id,
            request_type,
            status,
            created_at,
            approved_at,
            completed_at,
            requester_discord_id,
            commodities_master(name, symbol)
          `)
          .order('created_at', { ascending:false })
          .limit(500);

        if (error) {
          console.error('Error cargando registro:', error);
          tbody.innerHTML = '<tr><td colspan="8">No se pudo cargar el registro.</td></tr>';
          return;
        }

        rows = (reqs || []).map(r => {
          const cm = r.commodities_master;
          const itemName = cm ? (cm.symbol ? `${cm.name} (${cm.symbol})` : cm.name) : '—';

          const user = usersById[r.requester_discord_id];
          const requesterName = user?.handle_name || user?.discord_username || r.requester_discord_id || '—';

          let closedAt = null;
          if (['completada','rechazada','cancelada'].includes(r.status)) {
            closedAt = r.completed_at || r.approved_at || null;
          }

          return {
            id: r.id,
            tipo: r.request_type || null,
            activo: 'commodities',
            solicitante: requesterName,
            estado: r.status || 'pendiente',
            creada_at: r.created_at || null,
            cerrada_at: closedAt,
            detalle_url: `./solicitud_detalle.html?id=${encodeURIComponent(r.id)}`,
            itemName
          };
        });

        renderTable();
      }

      function inDateRange(isoDate, fromIso, toIso){
        if (!isoDate) return true;
        const d = isoDate.slice(0,10);
        if (fromIso && d < fromIso) return false;
        if (toIso && d > toIso) return false;
        return true;
      }

      function renderTable(){
        tbody.innerHTML = '';

        const term = (searchInput.value || '').trim().toLowerCase();
        const st   = statusFilter.value;
        const tp   = typeFilter.value;
        const act  = activeFilter.value;

        const filtered = rows.filter(r => {
          if (st !== 'todas' && r.estado !== st) return false;
          if (tp !== 'todas' && r.tipo !== tp) return false;
          if (act !== 'todas' && r.activo !== act) return false;

          const createdISO = r.creada_at ? new Date(r.creada_at).toISOString().slice(0,10) : '';
          if (!inDateRange(createdISO, fromISO, toISO)) return false;

          if (term) {
            const hay = `${r.solicitante} ${r.itemName} #${r.id}`.toLowerCase();
            if (!hay.includes(term)) return false;
          }
          return true;
        });

        if (!filtered.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 8;
          td.textContent = 'No hay resultados con esos filtros.';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }

        filtered.forEach(r => {
          const tr = document.createElement('tr');

          const tdId = document.createElement('td');
          tdId.textContent = `#${r.id}`;

          const tdTipo = document.createElement('td');
          tdTipo.innerHTML = `<span class="${tipoTagClass(r.tipo)}">${renderTipo(r.tipo)}</span>`;

          const tdAct = document.createElement('td');
          tdAct.innerHTML = `<span class="tag">${renderActivo(r.activo)}</span>`;

          const tdSol = document.createElement('td');
          tdSol.textContent = r.solicitante || '—';

          const tdEst = document.createElement('td');
          tdEst.innerHTML = `<span class="${statusTagClass(r.estado)}">${formatStatus(r.estado)}</span>`;

          const tdCre = document.createElement('td');
          tdCre.textContent = r.creada_at ? new Date(r.creada_at).toLocaleString() : '—';

          const tdCer = document.createElement('td');
          tdCer.textContent = r.cerrada_at ? new Date(r.cerrada_at).toLocaleString() : '—';

          const tdDet = document.createElement('td');
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'btn btn-secondary btn-sm';
          btn.textContent = 'Ver';
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            window.open(r.detalle_url, '_blank', 'width=720,height=760');
          });
          tdDet.appendChild(btn);

          tr.appendChild(tdId);
          tr.appendChild(tdTipo);
          tr.appendChild(tdAct);
          tr.appendChild(tdSol);
          tr.appendChild(tdEst);
          tr.appendChild(tdCre);
          tr.appendChild(tdCer);
          tr.appendChild(tdDet);

          tbody.appendChild(tr);
        });
      }

      function resetFilters(){
        searchInput.value = '';
        statusFilter.value = 'todas';
        typeFilter.value = 'todas';
        activeFilter.value = 'todas';

        fromISO = '';
        toISO = '';
        fromIsoHidden.value = '';
        toIsoHidden.value = '';
        fromApi?.setISO('');
        toApi?.setISO('');

        renderTable();
      }

      searchInput.addEventListener('input', renderTable);
      statusFilter.addEventListener('change', renderTable);
      typeFilter.addEventListener('change', renderTable);
      activeFilter.addEventListener('change', renderTable);
      clearBtn.addEventListener('click', resetFilters);

      await loadRows();
    });
  </script>
</body>
</html>
